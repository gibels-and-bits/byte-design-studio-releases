<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Byte Design Studio">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0612"/>
      <stop offset="100%" stop-color="#1e1240"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <circle cx="1050" cy="80" r="260" fill="url(#glowPurple)"/>
  <circle cx="120" cy="310" r="240" fill="url(#glowTeal)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
  </g>

  <text x="600" y="180" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="96" font-weight="800"
        fill="url(#titleGrad)">Byte Design Studio</text>

  <text x="600" y="240" text-anchor="middle"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="500"
        fill="#c4b5fd" fill-opacity="0.9">Describe it &#8226; See it &#8226; Ship it</text>

  <g stroke="#2dd4bf" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 80 155 L 50 155 L 50 225 L 80 225"/>
  </g>
  <g stroke="#a855f7" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 1120 155 L 1150 155 L 1150 225 L 1120 225"/>
  </g>

  <g fill="#2dd4bf" opacity="0.45">
    <circle cx="960" cy="70" r="3"/>
    <circle cx="990" cy="90" r="2"/>
    <circle cx="1010" cy="55" r="2.5"/>
  </g>
  <g fill="#a855f7" opacity="0.45">
    <circle cx="200" cy="295" r="3"/>
    <circle cx="240" cy="275" r="2"/>
    <circle cx="170" cy="320" r="2.5"/>
  </g>
</svg>
